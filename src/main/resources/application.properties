spring.application.name=AndinaTrading

# Configuración dinámica del puerto (Render usa la variable PORT)
server.port=${PORT:8080}

# Variables de entorno para la Base de Datos
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/AndinaTrading}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Configuración de Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# API Key dinámica
rapidapi.key=${RAPIDAPI_KEY}

# Logs
logging.level.org.springframework.web=DEBUG